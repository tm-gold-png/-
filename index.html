<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>備品発注管理アプリ</title>

<meta name="theme-color" content="#1f4e78">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="備品発注">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
:root{
  --navy:#1f4e78;--line:#cbd5df;--bg:#f5f7fa;--purple:#7651bd;
  --green:#dff3df;--green-strong:#2e7d32;--blue:#dceeff;--blue-strong:#1565c0;
  --red:#ffe2e2;--red-strong:#c62828;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:#25313c}
.app{max-width:1700px;margin:auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
h1{margin:0;color:var(--navy);font-size:24px}
.sub{font-size:13px;color:#657584;margin-top:4px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
button{border:0;border-radius:8px;padding:9px 12px;font-weight:700;cursor:pointer}
.add{background:var(--navy);color:#fff}.history{background:#0f7a5c;color:#fff}.reset{background:#fff0f0;color:#a31d1d;border:1px solid #efb8b8}
.panel{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(31,78,120,.10)}
.notice{padding:10px 14px;background:#fff8d9;border-bottom:1px solid #eadb8f;font-size:13px}
.table-wrap{overflow:auto;max-height:69vh}
table{border-collapse:separate;border-spacing:0;width:100%;min-width:1380px}
th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;text-align:center}
th{position:sticky;top:0;z-index:5;background:#eaf2f8;color:#17324a;white-space:nowrap}
th:first-child,td:first-child{border-left:1px solid var(--line)}
input,select{width:100%;border:1px solid #b8c3ce;border-radius:6px;padding:7px;font:inherit;background:#fff}
.no{width:48px;font-weight:700}.date-cell{min-width:110px;font-weight:700}
.action-cell{min-width:230px}.row-actions{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.order-btn{background:var(--purple);color:#fff}.cancel-btn{background:#fff1f1;color:var(--red-strong);border:1px solid #efb0b0}
.delivery-btn{background:var(--blue-strong);color:#fff}
tr.ordered td{background:var(--green)}tr.ordered .date-cell{color:var(--green-strong)}
tr.delivered td{background:var(--blue)}tr.delivered .date-cell{color:var(--blue-strong)}
.status-label{font-weight:700;white-space:nowrap}
.summary{display:flex;gap:10px;flex-wrap:wrap;padding:12px 14px;background:#fafcff;border-top:1px solid var(--line)}
.badge{padding:5px 10px;border-radius:999px;background:#e7eef5;color:var(--navy);font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}
.modal.open{display:flex}.modal-card{background:#fff;width:min(950px,100%);max-height:88vh;overflow:auto;border-radius:12px;padding:18px}
.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px}.close{background:#e9edf2;color:#333}
.month-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}
.month-card{border:1px solid var(--line);border-radius:10px;padding:12px;background:#fafcff}
.history-table{min-width:850px}.history-table th{position:static}
@media(max-width:760px){
  .app{padding:9px}h1{font-size:20px}.table-wrap{max-height:none;overflow:visible}
  table,thead,tbody,th,td,tr{display:block;min-width:0}thead{display:none}
  tr{margin:10px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  td{display:grid;grid-template-columns:105px 1fr;gap:8px;text-align:left;align-items:center;border-right:0}
  td::before{font-weight:700;color:#496174}
  td:nth-child(1)::before{content:"No."}td:nth-child(2)::before{content:"備品名"}td:nth-child(3)::before{content:"現在庫"}
  td:nth-child(4)::before{content:"発注時期"}td:nth-child(5)::before{content:"発注先"}td:nth-child(6)::before{content:"発注数量"}
  td:nth-child(7)::before{content:"注文者"}td:nth-child(8)::before{content:"備考"}
  td:nth-child(9)::before{content:"発注日"}td:nth-child(10)::before{content:"操作"}
  .row-actions{justify-content:flex-start}.row-actions button{flex:1}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>備品発注管理アプリ</h1><div class="sub">入力内容・発注状態・発注履歴は自動保存されます</div></div>
    <div class="actions">
      <button class="add" id="addRow">＋ 行を追加</button>
      <button class="history" id="showHistory">📊 月別履歴・集計</button>
      <button class="reset" id="reset">初期化</button>
    </div>
  </div>
  <div class="panel">
    <div class="notice">「発注」で緑色、「納品済」で青色になります。「発注取消」で元に戻せます。</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>No.</th><th>備品名</th><th>現在庫</th><th>発注時期</th>
          <th>発注先</th><th>発注数量</th><th>注文者</th><th>備考</th><th>発注日</th><th>操作</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="summary">
      <span class="badge">登録行数：<b id="rowCount">0</b></span>
      <span class="badge">発注済：<b id="orderedCount">0</b></span>
      <span class="badge">納品済：<b id="deliveredCount">0</b></span>
      <span class="badge">今月の発注：<b id="monthCount">0</b></span>
    </div>
  </div>
</div>

<div class="modal" id="historyModal">
  <div class="modal-card">
    <div class="modal-head"><h2 style="margin:0;color:var(--navy)">月別発注履歴・集計</h2><button class="close" id="closeHistory">閉じる</button></div>
    <div class="month-summary" id="monthSummary"></div>
    <div style="overflow:auto">
      <table class="history-table">
        <thead><tr><th>日時</th><th>処理</th><th>備品名</th><th>数量</th><th>発注先</th><th>注文者</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const DATA_KEY="supplyAppRowsV3";
const HISTORY_KEY="supplyAppHistoryV3";
const PERSON_OPTIONS=`<option value="">選択してください</option><option value="竹田">竹田</option><option value="神元">神元</option><option value="長友">長友</option><option value="柿沼">柿沼</option><option value="小山">小山</option><option value="岩切">岩切</option><option value="吉原">吉原</option><option value="河野">河野</option><option value="髙橋">髙橋</option><option value="池田">池田</option><option value="平林">平林</option><option value="佐藤">佐藤</option><option value="田村">田村</option><option value="籾木">籾木</option><option value="原田">原田</option><option value="粟井">粟井</option>`;

function emptyRow(){return {name:"",stock:"",orderTiming:"",vendor:"",qty:"1",person:"",note:"",status:"",orderDate:""}}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function nowText(){return new Date().toLocaleString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}

let rows=JSON.parse(localStorage.getItem(DATA_KEY)||"null")||Array.from({length:50},emptyRow);
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]");

function render(){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  rows.forEach((row,i)=>tbody.appendChild(createRow(row,i)));
  save(false);updateSummary();
}
function createRow(row,i){
  const tr=document.createElement("tr");
  if(row.status==="ordered")tr.classList.add("ordered");
  if(row.status==="delivered")tr.classList.add("delivered");
  tr.innerHTML=`
    <td class="no">${i+1}</td>
    <td><input data-k="name" value="${esc(row.name)}" placeholder="備品名"></td>
    <td><input data-k="stock" type="number" min="0" value="${esc(row.stock)}"></td>
    <td><input data-k="orderTiming" value="${esc(row.orderTiming)}" placeholder="例：残り2箱"></td>
    <td><input data-k="vendor" value="${esc(row.vendor)}" placeholder="発注先"></td>
    <td><input data-k="qty" type="number" min="1" value="${esc(row.qty||1)}"></td>
    <td><select data-k="person">${PERSON_OPTIONS}</select></td>
    <td><input data-k="note" value="${esc(row.note)}" placeholder="備考"></td>
    <td class="date-cell">${esc(row.orderDate||"")}</td>
    <td class="action-cell"><div class="row-actions">${actionButtons(row.status)}</div></td>`;
  tr.querySelector('[data-k="person"]').value=row.person||"";
  tr.querySelectorAll("[data-k]").forEach(el=>el.addEventListener("input",e=>{rows[i][e.target.dataset.k]=e.target.value;save()}));
  bindActions(tr,i);
  return tr;
}
function actionButtons(status){
  if(status==="ordered")return `<span class="status-label">発注済</span><button class="cancel-btn">発注取消</button><button class="delivery-btn">納品済</button>`;
  if(status==="delivered")return `<span class="status-label">納品済</span><button class="cancel-btn">発注取消</button>`;
  return `<button class="order-btn">📦 発注</button>`;
}
function bindActions(tr,i){
  const order=tr.querySelector(".order-btn");
  const cancel=tr.querySelector(".cancel-btn");
  const delivery=tr.querySelector(".delivery-btn");
  if(order)order.onclick=()=>placeOrder(i);
  if(cancel)cancel.onclick=()=>cancelOrder(i);
  if(delivery)delivery.onclick=()=>markDelivered(i);
}
function placeOrder(i){
  if(!rows[i].name.trim()){alert("備品名を入力してください。");return}
  rows[i].status="ordered";
  rows[i].orderDate=nowText();
  history.push({...rows[i],action:"発注",actionAt:new Date().toISOString()});
  persist();render();
}
function cancelOrder(i){
  if(!confirm("この行の発注状態を取り消しますか？"))return;
  history.push({...rows[i],action:"発注取消",actionAt:new Date().toISOString()});
  rows[i].status="";
  rows[i].orderDate="";
  persist();render();
}
function markDelivered(i){
  rows[i].status="delivered";
  history.push({...rows[i],action:"納品済",actionAt:new Date().toISOString()});
  persist();render();
}
function save(doPersist=true){if(doPersist)persist();updateSummary()}
function persist(){
  localStorage.setItem(DATA_KEY,JSON.stringify(rows));
  localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
}
function updateSummary(){
  document.getElementById("rowCount").textContent=rows.length;
  document.getElementById("orderedCount").textContent=rows.filter(r=>r.status==="ordered").length;
  document.getElementById("deliveredCount").textContent=rows.filter(r=>r.status==="delivered").length;
  const ym=new Date().toISOString().slice(0,7);
  document.getElementById("monthCount").textContent=history.filter(h=>h.action==="発注"&&h.actionAt.slice(0,7)===ym).length;
}
function showHistory(){
  const list=[...history].reverse();
  document.getElementById("historyBody").innerHTML=list.length?list.map(h=>`
    <tr><td>${new Date(h.actionAt).toLocaleString("ja-JP")}</td><td>${esc(h.action)}</td><td>${esc(h.name)}</td>
    <td>${esc(h.qty)}</td><td>${esc(h.vendor)}</td><td>${esc(h.person)}</td></tr>`).join("")
    :`<tr><td colspan="7">履歴はありません。</td></tr>`;
  const groups={};
  history.filter(h=>h.action==="発注").forEach(h=>{const ym=h.actionAt.slice(0,7);groups[ym]=(groups[ym]||0)+1});
  document.getElementById("monthSummary").innerHTML=Object.keys(groups).sort().reverse().map(ym=>
    `<div class="month-card"><b>${ym}</b><div style="font-size:22px;margin-top:5px">${groups[ym]}件</div></div>`
  ).join("")||`<div class="month-card">集計データはありません。</div>`;
  document.getElementById("historyModal").classList.add("open");
}
document.getElementById("addRow").onclick=()=>{rows.push(emptyRow());persist();render();window.scrollTo(0,document.body.scrollHeight)};
document.getElementById("showHistory").onclick=showHistory;
document.getElementById("closeHistory").onclick=()=>document.getElementById("historyModal").classList.remove("open");
document.getElementById("historyModal").onclick=e=>{if(e.target.id==="historyModal")e.currentTarget.classList.remove("open")};
document.getElementById("reset").onclick=()=>{
  if(!confirm("入力内容と履歴をすべて初期化しますか？"))return;
  rows=Array.from({length:50},emptyRow);history=[];persist();render();
};
render();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(console.error);
  });
}
</script>

</body>
</html>
