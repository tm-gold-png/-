<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>フロアマップ（レイアウトDB版）</title>
<!-- LIFF化: <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script> -->
<style>
:root{--bg:#0f141b;--sel:#141a23;--panel:#1d2530;--panel-2:#232c39;--line:#2b3543;--text:#eef2f7;--muted:#93a0b3;--gold:#e8b84b;font-synthesis:none}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.16,.84,.44,1);background:var(--bg)}
#screenMap{transform:translateX(100%);--mapbg:#0f141b}#screenMap.on{transform:translateX(0)}#screenMap.lightbg{--mapbg:#ffffff}
#screenSelect{background:var(--sel)}
.s-head{padding:16px 18px 6px}.s-head .brand{display:inline-flex;align-items:baseline;gap:9px;cursor:pointer;border:none;background:none;padding:0}
.s-head .mark{font-weight:800;font-size:20px;color:var(--gold);letter-spacing:.04em}.s-head .sub{font-size:11px;color:var(--muted);letter-spacing:.16em}
.s-head .store{font-size:13px;color:var(--text);margin-top:7px;font-weight:600}
.s-head .lead{font-size:12px;color:var(--muted);margin-top:3px}
.s-body{flex:1;overflow-y:auto;padding:6px 16px 28px;-webkit-overflow-scrolling:touch}
.lab{font-size:13px;font-weight:800;margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
.lab .n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--gold);color:#10131a;font-size:13px;font-weight:800}
.rates{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.rbtn{position:relative;padding:18px 16px;border-radius:15px;border:none;cursor:pointer;color:#10131a;text-align:left;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.rbtn .rl{font-weight:800;font-size:22px}.rbtn .rk{display:block;font-size:12px;font-weight:700;opacity:.85;margin-top:2px}
.rbtn .rc{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:800;background:rgba(0,0,0,.18);padding:4px 9px;border-radius:999px}
.rbtn.sel{outline:3px solid #fff;outline-offset:-1px}
.pk-filter{width:100%;height:44px;padding:0 14px;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--text);font-size:16px;outline:none;margin-bottom:10px}
.pk-filter:focus{border-color:var(--gold)}
.mrow{display:flex;align-items:center;gap:10px;padding:14px 14px;border-radius:12px;background:var(--panel);margin-bottom:8px;cursor:pointer;border:1px solid transparent}
.mrow:active{background:var(--panel-2)}.mrow.sel{border-color:var(--gold)}
.mrow .swatch{width:8px;height:30px;border-radius:4px;flex:none}
.mrow .mn{flex:1;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow .mc{font-size:13px;color:var(--muted);white-space:nowrap}.mrow .chev{color:var(--muted);font-size:18px}
.nos{display:flex;flex-wrap:wrap;gap:10px}
.nochip{min-width:64px;text-align:center;padding:15px 12px;border-radius:13px;background:var(--panel);border:1.5px solid var(--line);font-weight:800;font-size:18px;cursor:pointer;color:var(--text)}
.nochip:active{background:var(--gold);color:#10131a;border-color:var(--gold)}
.pk-empty{color:var(--muted);font-size:14px;padding:10px 2px}.hint{font-size:12px;color:var(--muted);margin:6px 2px 0}
.admin{margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
.admin .at{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.08em;margin-bottom:9px}
.abtn{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);color:var(--text);height:42px;padding:0 15px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;margin:0 8px 8px 0}
.abtn:active{background:var(--panel-2)}.abtn.gold{background:var(--gold);color:#10131a;border-color:var(--gold)}
.amsg{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;line-height:1.5}
.map-head{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:#1b232e;z-index:5}
.home{display:flex;align-items:center;gap:6px;background:var(--gold);border:none;color:#10131a;height:40px;padding:0 15px;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;flex:none;letter-spacing:.03em}
.mh-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px;overflow:hidden}
.rate-pill{font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px;color:#10131a;white-space:nowrap;flex:none}
.mh-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mh-no{font-size:13px;color:var(--muted);white-space:nowrap;flex:none}
.mh-spec{flex:none;text-decoration:none;background:var(--panel);border:1px solid var(--line);color:var(--text);font-weight:800;font-size:13px;padding:9px 13px;border-radius:10px}
main{flex:1;position:relative;overflow:hidden;background:var(--mapbg)}
#stage{position:absolute;inset:0;overflow:hidden;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;background:var(--mapbg)}#stage.grabbing{cursor:grabbing}
#mapwrap{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#overlay{position:absolute;left:0;top:0;overflow:visible;background:var(--mapbg)}
.machine{stroke:#fff;stroke-width:.5}
.machine.target{stroke:#10131a;stroke-width:1.2}
.hl-box{fill:none;stroke:#ffce2e;stroke-width:2.4;paint-order:stroke;filter:drop-shadow(0 0 2.5px rgba(255,190,20,.95))}
.hl-pulse{fill:none;stroke:#ffce2e;stroke-width:1.6;opacity:.75;transform-box:fill-box;transform-origin:center;animation:hlp 1.15s ease-out infinite;pointer-events:none}
@keyframes hlp{0%{opacity:.75;transform:scale(1)}100%{opacity:0;transform:scale(3.2)}}
.fac-label{text-anchor:middle;font-weight:800;pointer-events:none}
.zoom{position:absolute;right:12px;bottom:14px;z-index:6;display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:11px;overflow:hidden;border:1px solid var(--line)}
.zoom button{width:42px;height:42px;border:none;background:var(--panel);color:var(--text);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.zoom button:active{background:var(--gold);color:#10131a}
.home-fab{position:absolute;left:12px;bottom:14px;z-index:6;display:flex;align-items:center;gap:6px;background:var(--gold);color:#10131a;border:none;border-radius:11px;height:42px;padding:0 16px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.marker{position:absolute;z-index:7;transform:translate(-50%,-100%);pointer-events:none}
.marker .pin{position:relative;width:30px;height:30px;border-radius:50% 50% 50% 0;background:#10131a;transform:rotate(-45deg);box-shadow:0 0 0 5px rgba(255,255,255,.7),0 0 0 8px rgba(16,19,26,.35),0 6px 16px rgba(0,0,0,.5);margin:0 auto}
.marker .pin::after{content:"";position:absolute;left:50%;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
.marker .ring{position:absolute;left:50%;bottom:-4px;width:24px;height:24px;border-radius:50%;background:rgba(16,19,26,.45);transform:translate(-50%,0);animation:mpulse 1.1s ease-out infinite}
.marker .tag{position:absolute;left:50%;top:-34px;transform:translateX(-50%);background:#10131a;color:#fff;font-weight:800;font-size:14px;padding:4px 11px;border-radius:8px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.6)}
@keyframes mpulse{0%{opacity:.7;transform:translate(-50%,0) scale(.5)}100%{opacity:0;transform:translate(-50%,0) scale(3.8)}}
@media (prefers-reduced-motion:reduce){.marker .ring{animation:none;opacity:.5}.screen{transition:none}}
</style></head><body>

<section id="screenSelect" class="screen">
 <div class="s-head"><button class="brand" id="brandTop"><span class="mark">フロアマップ</span><span class="sub">台を探す</span></button>
  <div class="store" id="storeName"></div>
  <div class="lead">レート → 機種 → 台番号 の順に選ぶと、マップで光って案内します</div></div>
 <div class="s-body" id="selBody">
  <div class="lab"><span class="n">1</span>レートを選ぶ</div><div class="rates" id="pkRates"></div>
  <div id="stepModel" hidden><div class="lab"><span class="n">2</span>機種を選ぶ</div>
   <input class="pk-filter" id="pkFilter" placeholder="機種名で絞り込み" autocomplete="off"><div id="pkModels"></div></div>
  <div id="stepNo" hidden><div class="lab"><span class="n">3</span>台番号を選ぶ</div>
   <div class="nos" id="pkNos"></div><div class="hint">タップするとマップに移動して、その台が光ります</div></div>
  <div class="admin">
   <div class="at">店舗レイアウト（共有・登録・変更）</div>
   <button class="abtn gold" id="btnLoad">レイアウト読込（CSV / JSON）</button>
   <button class="abtn" id="btnTpl">台CSVテンプレ</button>
   <button class="abtn" id="btnTplF">設備CSVテンプレ</button>
   <button class="abtn" id="btnExport">現在の状態をJSON保存</button>
   <input type="file" id="fileInput" accept=".csv,.json,.txt" hidden>
   <div class="amsg" id="adminMsg">台CSV列：台番,レート,機種名,列,行 ／ 設備CSV列：種別,ラベル,列,行,幅,高さ<br>レート: p4=4円パ p1=1円パ s20=20円ス s5=5円ス ／ 設備種別: entrance/settle/change/toilet_m(男)/toilet_w(女)/rest/counter/elevator</div>
  </div>
 </div>
</section>

<section id="screenMap" class="screen">
 <div class="map-head"><button class="home" id="home">トップ</button>
  <div class="mh-info"><span class="rate-pill" id="mhRate"></span><span class="mh-name" id="mhName"></span><span class="mh-no num" id="mhNo"></span></div>
  <a class="mh-spec" id="mhSpec" href="#" target="_blank" rel="noopener">DMM</a></div>
 <main>
  <div id="stage"><div id="mapwrap"><svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg></div></div>
  <div class="marker" id="marker" hidden><div class="tag" id="mTag"></div><div class="pin"></div><div class="ring"></div></div>
  <button class="home-fab" id="homeFab">トップ（最初に戻る）</button>
  <div class="zoom"><button id="zin">＋</button><button id="zout">−</button><button id="zfit">⊙</button><button id="bgtoggle" title="背景の白黒を切替">◐</button></div>
 </main>
</section>

function buildFrom(db){
 DB=db; RATES=db.rates||DEFAULT_DB.rates; RMAP=Object.fromEntries(RATES.map(r=>[r.key,r]));
 machines=(db.machines||[]).map(m=>({no:+m.no,name:m.name||'',rate:m.rate,col:+m.col,row:+m.row,cx:+m.col*CW,cy:+m.row*CH}));

 rendered=false; st={rate:null,model:null};
}

document.getElementById('homeFab').onclick=resetToTop;

const stage=document.getElementById('stage'),wrap=document.getElementById('mapwrap'),overlay=document.getElementById('overlay');
let rendered=false;
function render(){overlay.innerHTML='';
 const W=ext.x1-ext.x0,H=ext.y1-ext.y0;
 overlay.setAttribute('viewBox',`${ext.x0} ${ext.y0} ${W} ${H}`);overlay.setAttribute('width',W);overlay.setAttribute('height',H);
 overlay.appendChild(el('rect',{id:'bgrect',x:ext.x0,y:ext.y0,width:W,height:H,fill:(bgDark?'#0f141b':'#ffffff')}));
 const g=el('g',{});
 // 設備（背面）
 for(const f of facilities){const t=FAC[f.type]||{label:f.type||'',color:'#9aa6b2',path:null};
  const w=f.w*CW,h=f.h*CH,x=f.cx,y=f.cy,fg=t.fg||'#fff';
  g.appendChild(el('rect',{x:x-w/2,y:y-h/2,width:w,height:h,rx:5,fill:t.color,opacity:.93,stroke:'#fff','stroke-width':1.4}));
  const isz=Math.min(w,h)*0.5;
  if(t.path)g.appendChild(el('path',{d:t.path,fill:fg,opacity:.95,transform:`translate(${x-isz/2},${y-h/2+Math.max(4,h*0.1)}) scale(${isz/24})`}));
  const tl=el('text',{class:'fac-label',x:x,y:y+h/2-Math.max(5,h*0.12),'font-size':Math.min(w*0.32,h*0.26,13),fill:fg});tl.textContent=f.label||t.label;g.appendChild(tl);
 }
 // 台（台番号つき・拡大で読める）
 for(const m of machines){const col=(RMAP[m.rate]||{}).color||'#888';
  const r=el('rect',{class:'machine',x:m.cx-TW/2,y:m.cy-TH/2,width:TW,height:TH,rx:2,fill:col,'data-no':m.no});m._g=r;g.appendChild(r);
  const t=el('text',{x:m.cx,y:m.cy+0.2,'text-anchor':'middle','dominant-baseline':'central','font-size':4.3,'font-weight':700,fill:(m.rate==='s5'?'#10131a':'#fff'),'pointer-events':'none','font-family':'Helvetica,Arial,sans-serif'});t.textContent=m.no;m._txt=t;g.appendChild(t);}
 // 選択台ハイライト用グループ（ゾーン文字は表示しない）
 g.appendChild(el('g',{id:'hl'}));
 overlay.appendChild(g);rendered=true;}

let view={s:1,tx:0,ty:0},target=null;
function applyView(){wrap.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.s})`;updateMarker();}
function fit(){const W=ext.x1-ext.x0,H=ext.y1-ext.y0,vw=stage.clientWidth,vh=stage.clientHeight,s=Math.min(vw/W,vh/H)*0.97;view.s=s;view.tx=(vw-W*s)/2-ext.x0*s;view.ty=(vh-H*s)/2-ext.y0*s;applyView();}
function focusPin(){if(!target){fit();return;}const W=ext.x1-ext.x0,H=ext.y1-ext.y0,vw=stage.clientWidth,vh=stage.clientHeight;const fitS=Math.min(vw/W,vh/H)*0.97;const s=Math.min(Math.max(vw/520,fitS),3.0);view.s=s;view.tx=vw/2-target.cx*s;view.ty=vh*0.44-target.cy*s;applyView();}
function zoomAt(f,px,py){const ns=Math.max(0.2,Math.min(9,view.s*f)),k=ns/view.s;view.tx=px-(px-view.tx)*k;view.ty=py-(py-view.ty)*k;view.s=ns;applyView();}
const marker=document.getElementById('marker');
function updateMarker(){if(!target||!screenMap.classList.contains('on')){marker.hidden=true;return;}marker.style.left=(view.tx+target.cx*view.s)+'px';marker.style.top=(view.ty+target.cy*view.s)+'px';marker.hidden=false;}
document.getElementById('zin').onclick=()=>zoomAt(1.3,stage.clientWidth/2,stage.clientHeight/2);
document.getElementById('zout').onclick=()=>zoomAt(0.77,stage.clientWidth/2,stage.clientHeight/2);
document.getElementById('zfit').onclick=()=>fit();
let bgDark=true;
function applyBg(){screenMap.classList.toggle('lightbg',!bgDark);const br=document.getElementById('bgrect');if(br)br.setAttribute('fill',bgDark?'#0f141b':'#ffffff');const b=document.getElementById('bgtoggle');if(b)b.textContent=bgDark?'◐':'◑';}
document.getElementById('bgtoggle').onclick=()=>{bgDark=!bgDark;applyBg();};
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();zoomAt(e.deltaY<0?1.12:0.89,e.clientX-r.left,e.clientY-r.top);},{passive:false});
const pts=new Map();let last=null,moved=false,suppressClick=false,pinch=0,raf=0;
function schedule(){if(raf)return;raf=requestAnimationFrame(()=>{raf=0;applyView();});}
stage.addEventListener('pointerdown',e=>{stage.setPointerCapture(e.pointerId);pts.set(e.pointerId,{x:e.clientX,y:e.clientY});moved=false;suppressClick=false;if(pts.size===1){last={x:e.clientX,y:e.clientY};stage.classList.add('grabbing');}if(pts.size===2)pinch=twoD();});
stage.addEventListener('pointermove',e=>{if(!pts.has(e.pointerId))return;pts.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pts.size>=2){const d=twoD(),c=twoC(),r=stage.getBoundingClientRect();if(pinch){const ns=Math.max(0.2,Math.min(9,view.s*(d/pinch))),kk=ns/view.s,px=c.x-r.left,py=c.y-r.top;view.tx=px-(px-view.tx)*kk;view.ty=py-(py-view.ty)*kk;view.s=ns;}pinch=d;moved=true;schedule();return;}if(last){const dx=e.clientX-last.x,dy=e.clientY-last.y;if(Math.abs(dx)+Math.abs(dy)>3)moved=true;view.tx+=dx;view.ty+=dy;last={x:e.clientX,y:e.clientY};schedule();}});
function endPt(e){pts.delete(e.pointerId);if(pts.size<2)pinch=0;if(pts.size===0){last=null;stage.classList.remove('grabbing');suppressClick=moved;setTimeout(()=>suppressClick=false,30);}}
stage.addEventListener('pointerup',endPt);stage.addEventListener('pointercancel',endPt);
function twoD(){const a=[...pts.values()];return Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);}
function twoC(){const a=[...pts.values()];return{x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};}
stage.addEventListener('click',e=>{if(suppressClick)return;const r=e.target.closest('.machine');if(r)setTarget(+r.getAttribute('data-no'));});
window.addEventListener('resize',()=>{if(rendered&&screenMap.classList.contains('on'))focusPin();});

const screenSelect=document.getElementById('screenSelect'),screenMap=document.getElementById('screenMap');
function setTarget(no){const m=byNo.get(no);if(!m)return;
 if(target){target._g.classList.remove('target');if(target._txt)target._txt.setAttribute('font-size',4.3);}
 target=m;m._g.classList.add('target');
 if(m._txt)m._txt.setAttribute('font-size',5.6);
 const hl=document.getElementById('hl');if(hl){hl.innerHTML='';const W=TW+2.6,H=TH+2.6;
  hl.appendChild(el('rect',{class:'hl-pulse',x:m.cx-W/2,y:m.cy-H/2,width:W,height:H,rx:3}));
  hl.appendChild(el('rect',{class:'hl-box',x:m.cx-W/2,y:m.cy-H/2,width:W,height:H,rx:3}));}
 const col=(RMAP[m.rate]||{}).color||'#888';document.getElementById('mTag').textContent=m.no;
 const rp=document.getElementById('mhRate');rp.textContent=(RMAP[m.rate]||{}).label||m.rate;rp.style.background=col;
 document.getElementById('mhName').textContent=m.name||'機種名 未設定';
 document.getElementById('mhNo').textContent='台番 '+m.no;
 const sp=document.getElementById('mhSpec');if(m.name){sp.style.display='block';sp.href=specUrl(m);}else sp.style.display='none';
 updateMarker();}
function goMap(no){screenMap.classList.add('on');if(!rendered)render();setTarget(no);requestAnimationFrame(focusPin);}

// ---- 読込・登録・変更 ----
const adminMsg=document.getElementById('adminMsg');
function msg(t){adminMsg.innerHTML=t;}
document.getElementById('btnLoad').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{applyLayout(f.name,rd.result);}catch(e){msg('読込エラー: '+e.message);}ev.target.value='';};rd.readAsText(f,'utf-8');});
function applyLayout(fname,text){
 if(/\.json$/i.test(fname)||text.trim()[0]==='{'){const db=JSON.parse(text);if(!db.machines)throw new Error('machines がありません');buildFrom(db);renderRates();resetToTop();msg('✓ JSON読込：'+(db.store||fname)+'（'+(db.machines.length)+'台・設備'+((db.facilities||[]).length)+'）');return;}
 const p=csvAuto(text);
 if(p.kind==='fac'){DB.facilities=p.rows;buildFrom(DB);renderRates();resetToTop();msg('✓ 設備CSV読込：'+p.rows.length+'件 反映');}
 else{DB.machines=p.rows;buildFrom(DB);renderRates();resetToTop();msg('✓ 台CSV読込：'+p.rows.length+'台 反映');}
}
function csvAuto(text){text=text.replace(/^\uFEFF/,'');const lines=text.split(/\r?\n/).filter(l=>l.trim());const head=splitCsv(lines[0]).map(h=>h.replace(/\s/g,''));
 const has=n=>head.indexOf(n);
 if(has('種別')>=0||has('type')>=0){const it=has('種別')>=0?has('種別'):has('type'),il=has('ラベル')>=0?has('ラベル'):has('label'),ic=has('列')>=0?has('列'):has('col'),ir=has('行')>=0?has('行'):has('row'),iw=has('幅')>=0?has('幅'):has('w'),ih=has('高さ')>=0?has('高さ'):has('h');
  const rows=[];for(let i=1;i<lines.length;i++){const c=splitCsv(lines[i]);if(!c[it])continue;rows.push({type:c[it].trim(),label:(c[il]||'').trim(),col:+c[ic],row:+c[ir],w:+c[iw]||3,h:+c[ih]||3});}return {kind:'fac',rows};}
 const iNo=has('台番')>=0?has('台番'):0,iR=has('レート')>=0?has('レート'):1,iNm=has('機種名')>=0?has('機種名'):2,iC=has('列')>=0?has('列'):3,iRw=has('行')>=0?has('行'):4;
 const rows=[];for(let i=1;i<lines.length;i++){const c=splitCsv(lines[i]);if(!c[iNo])continue;rows.push({no:+c[iNo],rate:(c[iR]||'').trim(),name:(c[iNm]||'').trim(),col:+c[iC],row:+c[iRw]});}return {kind:'mac',rows};
}
function splitCsv(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}else{if(ch===','){out.push(cur);cur='';}else if(ch==='"')q=true;else cur+=ch;}}out.push(cur);return out;}
function dl(name,text,type){const b=new Blob([text],{type:type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}
document.getElementById('btnTpl').onclick=()=>{const r=[['台番','レート','機種名','列','行'],['1','s20','（機種名）','14','31'],['2','p4','（機種名）','40','31'],['3','p1','（機種名）','60','31'],['4','s5','（機種名）','35','2']];dl('台テンプレ.csv','\uFEFF'+r.map(x=>x.join(',')).join('\r\n'),'text/csv');msg('台CSVテンプレを保存（Excel編集→読込）');};
document.getElementById('btnTplF').onclick=()=>{const r=[['種別','ラベル','列','行','幅','高さ'],['entrance','出入口A','9','0','3','2'],['toilet_m','男性','1','14','4','3'],['toilet_w','女性','1','18','4','3'],['counter','カウンター','83','40','3','7'],['rest','休憩所','83','14','3','9'],['settle','精算機','83','35','3','2'],['change','両替機','38','29','3','2'],['elevator','EV','1','33','3','3']];dl('設備テンプレ.csv','\uFEFF'+r.map(x=>x.join(',')).join('\r\n'),'text/csv');msg('設備CSVテンプレを保存（種別: entrance/settle/change/toilet_m/toilet_w/rest/counter/elevator）');};
document.getElementById('btnExport').onclick=()=>{dl((DB.store||'layout')+'.json',JSON.stringify(DB,null,1),'application/json');msg('現在の状態をJSONで保存しました（配布用）');};

buildFrom(DEFAULT_DB);renderRates();applyBg();
async function initLiff(){if(!window.liff)return;try{await liff.init({liffId:'0000000000-xxxxxxxx'});}catch(e){console.warn('LIFF skip',e);}}
initLiff();
